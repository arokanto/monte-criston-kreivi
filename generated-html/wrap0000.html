<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <title>Kansi</title>
  <style>
    /* epub-layout.css */
    @charset "utf-8";
    body {
        color: black;
        background-color: white;
        width: auto;
        border: 0;
        padding: 0
        }
    div, p, h1, h2 {
        margin-left: 0;
        margin-right: 0;
        display: block
        }
    h2 {
        page-break-before: always;
        padding-top: 1em
        }
    .cover-image-frame {
        background-color: grey;
        text-align: center;
        padding: 0;
        margin: 0;
        page-break-after: always;
        text-indent: 0;
        width: 100%;
        height: 100%
        }
    body.cover-page {
        margin: 0;
        padding: 0
        }
    
    
    /* book.css */
    p {
        margin-top: 0.25em;
        margin-bottom: 0;
        line-height: 1.4;
    }
    body > p,
    section[role="doc-chapter"] > p {
        text-indent: 1em;
    }
    h1 + p {
        text-indent: 0;
    }
    li {
        margin-top: 0.25em;
        margin-bottom: 0;
        line-height: 1.2;
    }
    h2 {
        margin-top: 3em;
        margin-bottom: 2em;
        clear: both;
    }
    .chapter-title {
        font-size: 1.6em;
        font-weight: bold;
        line-height: 1.25;
        margin-top: 3em;
        margin-bottom: 1.5em;
        text-indent: 0;
    }
    .chapter-title + p {
        margin-top: 0;
        text-indent: 0;
    }
    section[role="doc-chapter"] > .chapter-title + p,
    section[role="doc-endnotes"] > .chapter-title + aside {
        margin-top: 2em;
    }
    .titlepage {
        margin-top: 20%;
        text-align: center;
        text-indent: 0;
    }
    .titlepage h1 {
        font-size: 1.6em;
        font-weight: bold;
        line-height: 1.25;
        margin-top: 0;
        margin-bottom: 2em;
        text-indent: 0;
    }
    .titlepage p {
        margin-top: 0.5em;
        text-indent: 0;
    }
    .titlepage .translator,
    .titlepage .original-work {
        margin-top: 2em;
    }
    .source-note {
        font-size: 0.9em;
        margin-top: 4em;
        margin-left: 5%;
        margin-right: 5%;
        text-indent: 0;
    }
    .source-note h2 {
        font-size: 1em;
        font-weight: bold;
        margin-top: 0;
        margin-bottom: 1em;
        padding-top: 0;
        page-break-before: auto;
        text-indent: 0;
    }
    .source-note p {
        margin-top: 0;
        text-indent: 0;
    }
    .frontmatter-toc {
        margin-top: 4em;
    }
    .frontmatter-toc ol {
        list-style-type: none;
        margin-left: 4%;
        margin-right: 4%;
        padding-left: 0;
    }
    .frontmatter-toc li {
        text-indent: 0;
    }
    .end-marker {
        font-weight: bold;
        margin-top: 3em;
        text-indent: 0;
    }
    .list-unstyled {
        list-style-type: none;
    }
    .letter,
    .quoted-document {
        margin-top: 1em;
        margin-bottom: 1em;
        margin-left: 5%;
        margin-right: 5%;
    }
    .letter p,
    .quoted-document p {
        text-indent: 0;
    }
    .quoted-document p + p {
        margin-top: 0.75em;
    }
    .record-name,
    .document-signature {
        text-indent: 0;
    }
    .verse-quote {
        margin-left: 5%;
        margin-right: 5%;
    }
    .verse-quote p {
        text-indent: 0;
    }
  </style>
</head>
<body class="cover-page">
<div class="cover-image-frame">
      <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-labelledby="cover-title" height="100%" preserveAspectRatio="xMidYMid meet" role="img" version="1.1" viewBox="0 0 1600 2400" width="100%">
        <title id="cover-title">Monte-Criston kreivi - kansikuva</title>
        <image width="1600" height="2400" href="cover-image.jpg"/>
      </svg>
    </div>
</body>
</html>
